name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  PROJECT_PATH: QaaS.Runner.sln
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}\BuildOutput
  RESTORED_PACKAGES_PATH: ${{ github.workspace }}\RestoredPackages

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Detect tag
        id: stable_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "is_stable_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore packages
        run: dotnet restore ${{ env.PROJECT_PATH }} --packages ${{ env.RESTORED_PACKAGES_PATH }}

      - name: Build project
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Test solution
        run: dotnet test ${{ env.PROJECT_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore --no-build --maxcpucount

      - name: Pack project
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} `
            --no-restore --no-build `
            --configuration ${{ env.CONFIGURATION }} `
            --include-symbols `
            -p:PackageVersion=${{ steps.stable_tag.outputs.tag }} `
            --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

      - name: Push package
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        run: dotnet nuget push ${{ env.PACKAGE_OUTPUT_DIRECTORY }}\*.nupkg -k ${{ secrets.NUGET_AUTH_TOKEN }} -s https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Write restored packages metadata
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        shell: pwsh
        run: |
          $metadata = @{
            repository = "${{ github.repository }}"
            tag = "${{ steps.stable_tag.outputs.tag }}"
            runId = "${{ github.run_id }}"
            createdAtUtc = (Get-Date).ToUniversalTime().ToString("o")
          } | ConvertTo-Json

          $metadataPath = Join-Path "${{ env.RESTORED_PACKAGES_PATH }}" "restore-artifact-metadata.json"
          $metadata | Set-Content -Path $metadataPath

      - name: Upload restored packages artifact
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: restored-packages
          path: ${{ env.RESTORED_PACKAGES_PATH }}
          if-no-files-found: error
          retention-days: 7

