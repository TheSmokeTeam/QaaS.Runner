anchors:
  rabbitmq: &rabbitmq ${variables:rabbitmq}

MetaData:
  Team: REDA
  System: QaaS
  ExtraLabels:
    Component: REDA

Storages:
  - FileSystem:
      Path: SessionDataStorage
        
DataSources:
  - Name: TestDataSource3
    Generator: TestGenerator
    DataSourceNames: [ TestDataSource2 ]
    GeneratorConfiguration:
      Count: 30
      ComplexConfigList:
        - SomeItem: "ItemA"
    Lazy: true
  - Name: TestDataSource2
    Generator: TestGenerator
    DataSourceNames: [ TestDataSource ]
    GeneratorConfiguration:
      Count: 30
      ComplexConfigList:
        - SomeItem: "ItemA"
    Lazy: true
  - Name: TestDataSource
    Generator: TestGenerator
    GeneratorConfiguration:
      Count: 30
      ComplexConfigList:
        - SomeItem: "ItemA"
  - Name: TestDataSourceFromDataSource
    Generator: FromGeneratorGenerator
    Lazy: true
    DataSourceNames: [ TestDataSource ]
  - Name: FromConsumerGenerator
    Generator: FromConsumerGenerator
    GeneratorConfiguration:
      SessionName: Session4
      ConsumerName: Consumer
    Lazy: true
  - Name: TestPatterns
    Generator: FromConsumerGenerator
    DataSourceNames: [ TestDataSource2 ]
    DataSourcePatterns: [ ^From.* ]
    GeneratorConfiguration:
      SessionName: Session4
      ConsumerName: Consumer
    Lazy: true

Sessions:
  - Name: Session0
    SaveData: true
    Publishers:
      - Name: Publisher
        DataSourceNames: [ TestDataSource3 ]
        DataSourcePatterns:
        RabbitMq:
          <<: *rabbitmq
          ExchangeName: test
        Serialize:
          Serializer: Json
    #        Loop: true
    
    Consumers:
      - Name: Consumer
        TimeoutMs: 5000
        RabbitMq:
          <<: *rabbitmq
          ExchangeName: test
        Deserialize:
          Deserializer: Json
          SpecificType:
            AssemblyName: QaaS.Runner.E2ETests
            TypeFullName: QaaS.Runner.E2ETests.MockJson


Assertions:
  - SessionNamePatterns: [ "Session0" ]
    Assertion: PassedAssertion
    Name: Assertion1
    Category: test

  - Name: Assertion2
    Category: test
    Assertion: WithDataSourceAssertion
    DataSourceNames: [ "TestDataSourceFromDataSource" ]
